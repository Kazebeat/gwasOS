    <!-- ==================== SLOWER GWASOS LOADING SCRIPT ==================== -->
  <script>
    window.addEventListener('load', function() {
      const loader = document.getElementById('gwas-loader');
      const progressBar = document.getElementById('progress-bar');
      const loadingText = document.getElementById('loading-text');

      let progress = 0;
      const messages = [
        "Booting gwasOS...",
        "Loading beat catalog...",
        "Connecting to the sauce...",
        "game was a success",
        "Launching desktop..."
      ];
      let msgIndex = 0;

      // SLOWER ANIMATION - takes about 4.5 to 5.5 seconds
      const interval = setInterval(() => {
        progress += Math.random() * 7 + 3;   // smaller increments = slower

        if (progress > 100) progress = 100;
        progressBar.style.width = progress + '%';

        // Change message less frequently
        if (progress > msgIndex * 25 && msgIndex < messages.length) {
          loadingText.textContent = messages[msgIndex];
          msgIndex++;
        }

        if (progress >= 100) {
          clearInterval(interval);

          // Longer fade out so it feels premium
          loader.style.transition = 'opacity 1.2s ease-out';
          loader.style.opacity = '0';

          setTimeout(() => {
            loader.remove();
          }, 1250);
        }
      }, 90);   // Increased from 65ms → 90ms (noticeably slower)
    });
  </script>
